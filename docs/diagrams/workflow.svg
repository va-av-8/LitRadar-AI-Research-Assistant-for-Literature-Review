<text x="377" y="321" text-anchor="middle" font-size="12" fill="#fff" font-weight="500">Planner Agent</text>
<text x="377" y="333" text-anchor="middle" font-size="9" fill="#ede9fe">3–5 подзапросов</text>

<rect x="295" y="379" width="165" height="44" rx="5" fill="#0F766E" stroke="#0d6460" stroke-width="1"/>
