<text x="377" y="155" text-anchor="middle" font-size="12" fill="#fff" font-weight="500">Input Guard</text>
<text x="377" y="167" text-anchor="middle" font-size="9" fill="#fef3c7">тематика · ширина · безоп.</text>

<rect x="295" y="213" width="165" height="44" rx="5" fill="#0284C7" stroke="#0369A1" stroke-width="1"/>
<text x="377" y="225" text-anchor="middle" font-size="9" fill="#bae6fd">[Retrieval]</text>
<text x="377" y="238" text-anchor="middle" font-size="12" fill="#fff" font-weight="500">KB Lookup</text>
<text x="377" y="250" text-anchor="middle" font-size="9" fill="#e0f2fe">→ papers_from_kb</text>

<rect x="295" y="296" width="165" height="44" rx="5" fill="#6D28D9" stroke="#5b20b8" stroke-width="1"/>
