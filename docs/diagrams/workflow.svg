<text x="450" y="22" text-anchor="middle" font-size="11" fill="#aaa" letter-spacing="3" font-weight="500">WORKFLOW — LITRADAR</text>

<text x="42" y="43" font-size="9" fill="#888">
  <tspan fill="#B45309" font-weight="700">■</tspan><tspan> Guardrail  </tspan>
  <tspan fill="#6D28D9" font-weight="700">■</tspan><tspan> LLM-агент  </tspan>
  <tspan fill="#0F766E" font-weight="700">■</tspan><tspan> Tool  </tspan>
  <tspan fill="#0284C7" font-weight="700">■</tspan><tspan> Retrieval  </tspan>
  <tspan fill="#991B1B" font-weight="700">■</tspan><tspan> STOP  </tspan>
  <tspan fill="#15803D" font-weight="700">↺</tspan><tspan> retry / loop</tspan>
</text>

