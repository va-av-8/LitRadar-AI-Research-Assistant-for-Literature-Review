<text x="377" y="902" text-anchor="middle" font-size="12" fill="#fff" font-weight="500">Verifier</text>
<text x="377" y="914" text-anchor="middle" font-size="9" fill="#ccfbf1">HTTP-верификация цитат</text>

<rect x="295" y="960" width="165" height="44" rx="5" fill="#6D28D9" stroke="#5b20b8" stroke-width="1"/>
