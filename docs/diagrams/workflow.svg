<text x="377" y="985" text-anchor="middle" font-size="12" fill="#fff" font-weight="500">Renderer Agent</text>
<text x="377" y="997" text-anchor="middle" font-size="9" fill="#ede9fe">→ Markdown обзор</text>

<rect x="320" y="1043" width="110" height="36" rx="18" fill="#15803D" stroke="#0f5c2e" stroke-width="1"/>
<text x="375" y="1061" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#dcfce7" font-weight="500">обзор готов</text>

