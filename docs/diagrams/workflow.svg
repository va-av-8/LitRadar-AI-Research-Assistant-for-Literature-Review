<text x="377" y="404" text-anchor="middle" font-size="12" fill="#fff" font-weight="500">Search Agent</text>
<text x="377" y="416" text-anchor="middle" font-size="9" fill="#ccfbf1">ArXiv + Semantic Scholar</text>

<rect x="295" y="462" width="165" height="44" rx="5" fill="#B45309" stroke="#92400E" stroke-width="1"/>
<text x="377" y="474" text-anchor="middle" font-size="9" fill="#fde68a">[Guardrail]</text>
<text x="377" y="487" text-anchor="middle" font-size="12" fill="#fff" font-weight="500">Sanitization</text>
<text x="377" y="499" text-anchor="middle" font-size="9" fill="#fef3c7">anti-injection layer</text>

<rect x="295" y="545" width="165" height="44" rx="5" fill="#6D28D9" stroke="#5b20b8" stroke-width="1"/>
<text x="377" y="557" text-anchor="middle" font-size="9" fill="#ddd6fe">[LLM Agent]</text>
<text x="377" y="570" text-anchor="middle" font-size="12" fill="#fff" font-weight="500">Critic Agent</text>
<text x="377" y="582" text-anchor="middle" font-size="9" fill="#ede9fe">батч ~10 статей</text>

<rect x="295" y="628" width="165" height="44" rx="5" fill="#0284C7" stroke="#0369A1" stroke-width="1"/>
