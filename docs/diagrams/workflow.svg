<text x="377" y="736" text-anchor="middle" font-size="12" fill="#fff" font-weight="500">Synthesis Agent</text>
<text x="377" y="748" text-anchor="middle" font-size="9" fill="#ede9fe">секции · противоречия · open_q.</text>

<rect x="295" y="794" width="165" height="44" rx="5" fill="#B45309" stroke="#92400E" stroke-width="1"/>
<text x="377" y="806" text-anchor="middle" font-size="9" fill="#fde68a">[Guardrail]</text>
<text x="377" y="819" text-anchor="middle" font-size="12" fill="#fff" font-weight="500">Citation Guard</text>
<text x="377" y="831" text-anchor="middle" font-size="9" fill="#fef3c7">paper_id ∈ accepted</text>

<rect x="295" y="877" width="165" height="44" rx="5" fill="#0F766E" stroke="#0d6460" stroke-width="1"/>
