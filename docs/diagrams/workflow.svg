<text x="377" y="653" text-anchor="middle" font-size="12" fill="#fff" font-weight="500">Index → ChromaDB</text>
<text x="377" y="665" text-anchor="middle" font-size="9" fill="#e0f2fe">papers_accepted → KB</text>

<rect x="295" y="711" width="165" height="44" rx="5" fill="#6D28D9" stroke="#5b20b8" stroke-width="1"/>
