<rect x="540" y="134" width="230" height="36" rx="5" fill="#991B1B" stroke="#7f1d1d" stroke-width="1"/>
<text x="655" y="156" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#fee2e2">вне тематики / широкий → STOP</text>

<rect x="540" y="383" width="230" height="36" rx="5" fill="#991B1B" stroke="#7f1d1d" stroke-width="1"/>
<text x="655" y="405" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#fee2e2">0–2 результата / API down → STOP</text>

<rect x="540" y="466" width="230" height="36" rx="5" fill="#991B1B" stroke="#7f1d1d" stroke-width="1"/>
<text x="655" y="488" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#fee2e2">&gt;30% injection → STOP</text>

<rect x="540" y="549" width="230" height="36" rx="5" fill="#991B1B" stroke="#7f1d1d" stroke-width="1"/>
<text x="655" y="571" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#fee2e2">все статьи отсеяны → STOP</text>

<rect x="540" y="715" width="230" height="36" rx="5" fill="#991B1B" stroke="#7f1d1d" stroke-width="1"/>
<text x="655" y="730" text-anchor="middle" font-size="10" fill="#fee2e2" font-weight="500">budget &gt; $0.15 → STOP</text>
<text x="655" y="744" text-anchor="middle" font-size="8" fill="#fca5a5">(при любом LLM-вызове)</text>

<rect x="540" y="881" width="230" height="36" rx="5" fill="#991B1B" stroke="#7f1d1d" stroke-width="1"/>
<text x="655" y="903" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#fee2e2">все цитаты не прошли → STOP</text>

<text x="540" y="420" font-size="8" fill="#94a3b8" font-style="italic">один API → продолжить (gap note)</text>

</svg>
