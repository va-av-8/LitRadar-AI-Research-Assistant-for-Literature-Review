<text x="76" y="443" text-anchor="end" font-size="9" fill="#15803D" transform="rotate(-90 76 443)">iter &lt; 2 · &gt;60% отсеяно</text>

<path d="M 295 733 L 66 733 L 66 318 L 295 318" fill="none" stroke="#15803D" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arr)"/>
<text x="60" y="526" text-anchor="end" font-size="9" fill="#15803D" transform="rotate(-90 60 526)">iter &lt; 2 · open_questions</text>

